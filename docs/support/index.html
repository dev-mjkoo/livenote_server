<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LiveNote Support</title>
    <meta name="description" content="LiveNote support language selector" />
    <link rel="stylesheet" href="/legal.css" />
  </head>
  <body>
    <main class="legal-page">
      <header class="legal-hero">
        <p class="eyebrow">LiveNote Support</p>
        <h1>Support</h1>
        <p class="subtitle">Redirecting to your language. If needed, choose manually below.</p>
        <p class="index-note">Support language pages</p>
        <div class="redirect-links"><a href="/support/kr/">한국어</a><a href="/support/us/">English</a><a href="/support/jp/">日本語</a><a href="/support/zh-hans/">简体中文</a><a href="/support/zh-hant/">繁體中文</a><a href="/support/de/">Deutsch</a></div>
      </header>
    </main>

    <script>
      (function () {
        const input = String(navigator.language || '').toLowerCase();
        let locale = 'us';

        if (input.startsWith('ko')) locale = 'kr';
        else if (input.startsWith('ja')) locale = 'jp';
        else if (input.startsWith('de')) locale = 'de';
        else if (input.startsWith('zh-hant') || input.startsWith('zh-tw') || input.startsWith('zh-hk') || input.startsWith('zh-mo')) locale = 'zh-hant';
        else if (input.startsWith('zh')) locale = 'zh-hans';

        window.location.replace('/support/' + locale + '/');
      })();
    </script>
  </body>
</html>
